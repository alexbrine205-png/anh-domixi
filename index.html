<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strinova Gift</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Không cho cuộn trang */
        }

        /* LỚP NỀN MỜ */
        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bgstri.jpg'); /* Đảm bảo file ảnh tên là bgstri.jpg */
            background-size: cover;
            background-position: center;
            filter: blur(15px); /* Độ mờ */
            transform: scale(1.1);
            z-index: -2;
        }

        /* LỚP PHỦ TỐI NHẸ */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* NỘI DUNG CHÍNH GIỮA MÀN HÌNH */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .gift-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
        }

        .btn-claim {
            background: #ff5e1a;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-claim:hover { transform: scale(1.05); background: #e54d15; }

        /* MODAL ĐĂNG NHẬP (ẨN LÚC ĐẦU) */
        .modal {
            display: none; /* Chỉ hiện khi bấm nút */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 850px;
            height: 500px;
            background: white;
            display: flex;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .login-left {
            flex: 1.2;
            background: url('bgstri.jpg') left center/cover;
        }

        .login-right {
            flex: 0.8;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h2 { font-size: 28px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-login {
            background: #ff5e1a;
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 25px;
            cursor: pointer;
            color: #999;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <div class="overlay"></div>

    <div class="hero">
        <div class="gift-card">
            <h1 style="color: #ff5e1a; margin: 0;">CHÚC MỪNG!</h1>
            <p style="font-size: 18px;">Bạn nhận được <b>5000 Bablo</b> miễn phí.</p>
            <p>Vui lòng đăng nhập để nhận quà về tài khoản.</p>
            <button class="btn-claim" onclick="showLogin()">ĐĂNG NHẬP NGAY</button>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="login-box">
            <span class="close-modal" onclick="hideLogin()">&times;</span>
            <div class="login-left"></div>
            <div class="login-right">
                <h2>ACCOUNT LOGIN</h2>
                <div class="input-group">
                    <input type="text" placeholder="Please enter your email">
                    <input type="password" placeholder="Please enter your password">
                </div>
                <button class="btn-login" onclick="startRickroll()">LOGIN</button>
                
                <p style="text-align: center; font-size: 12px; color: #666; margin-top: 15px;">
                    Forget password? | <span style="color: #ff5e1a; cursor: pointer;">Register</span>
                </p>

                <div class="socials">
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-google"></i>
                    <i class="fa-brands fa-apple"></i>
                    <i class="fa-brands fa-x-twitter"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        function hideLogin() {
            document.getElementById('loginModal').style.display = 'none';
        }
        function startRickroll() {
            alert("Đang kết nối đến server Strinova...");
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        }
    </script>
</body>
</html>
