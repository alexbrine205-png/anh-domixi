<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà Tặng Đặc Biệt Cho Bạn!</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Tạo lớp nền để làm mờ hình ảnh mà không ảnh hưởng đến nội dung chữ */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Thay link ảnh của bạn vào đây */
            background-image: url('bgstri.jpg'); 
            background-size: cover;
            background-position: center;
            filter: blur(8px); /* Độ mờ của hình nền */
            -webkit-filter: blur(8px);
            transform: scale(1.1); /* Phóng to nhẹ để không lộ viền trắng khi blur */
            z-index: -1;
        }

        /* Lớp phủ tối để chữ dễ đọc hơn (tùy chọn) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9); /* Màu trắng hơi trong suốt */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 400px;
            z-index: 1;
        }

        h1 { color: #1877f2; margin-top: 0; }
        p { color: #333; }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { 
            background-color: #ff6b81; 
            transform: scale(1.05); 
        }
    </style>
</head>
<body>

<div class="background-image"></div>
<div class="overlay"></div>

<div class="container">
    <h1>Bạn đã nhận được 5000 bablo</h1>
    <p>Chúc mừng! bạn đã trúng được 5000 bablo tặng kèm 1 khô gà đè tem.</p>
    <p>Nhấn vào nút bên dưới để điền thông tin nhận quà</p>
    <button onclick="rickRoll()">Điền thông tin ngay</button>
</div>

<script>
    function rickRoll() {
        window.location.href = "https://www.youtube.com/watch?v=N7rdZGqqUAk";
    }
</script>

</body>
</html>
