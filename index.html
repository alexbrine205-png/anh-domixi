<!DOCTYPE html>
<html lang="vi">
<head>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { color: #1877f2; }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #ff6b81; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <h1>Bạn đã nhận được một hộp khô gà</h1>

    <button onclick="rickRoll()">điền thông tin ngay</button>
</div>

<script>

        window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
